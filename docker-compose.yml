version: "3.9"

services:
  documind:
    build: .
    container_name: documind-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # persist ChromaDB across restarts
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
